<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Professional gradient -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="30%" style="stop-color:#2563eb"/>
      <stop offset="70%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    
    <!-- File gradients -->
    <linearGradient id="fileWhite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
    
    <!-- Shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
    
    <!-- Inner glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#mainGradient)" filter="url(#shadow)"/>
  
  <!-- File transformation concept - "Before" messy files -->
  <g opacity="0.9">
    <!-- Chaotic file 1 -->
    <rect x="20" y="25" width="28" height="36" rx="4" fill="url(#fileWhite)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <rect x="24" y="32" width="16" height="2.5" rx="1.25" fill="#ef4444" opacity="0.6"/>
    <rect x="24" y="36" width="20" height="2.5" rx="1.25" fill="#ef4444" opacity="0.4"/>
    <rect x="24" y="40" width="12" height="2.5" rx="1.25" fill="#ef4444" opacity="0.5"/>
    <rect x="24" y="44" width="18" height="2.5" rx="1.25" fill="#ef4444" opacity="0.3"/>
    <rect x="24" y="48" width="8" height="2.5" rx="1.25" fill="#ef4444" opacity="0.6"/>
    <rect x="24" y="52" width="14" height="2.5" rx="1.25" fill="#ef4444" opacity="0.4"/>
    
    <!-- Chaotic file 2 (smaller, overlapping) -->
    <rect x="15" y="45" width="24" height="30" rx="3" fill="url(#fileWhite)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <rect x="18" y="50" width="14" height="2" rx="1" fill="#f59e0b" opacity="0.6"/>
    <rect x="18" y="53" width="18" height="2" rx="1" fill="#f59e0b" opacity="0.4"/>
    <rect x="18" y="56" width="10" height="2" rx="1" fill="#f59e0b" opacity="0.5"/>
    <rect x="18" y="59" width="16" height="2" rx="1" fill="#f59e0b" opacity="0.4"/>
    <rect x="18" y="62" width="12" height="2" rx="1" fill="#f59e0b" opacity="0.6"/>
    <rect x="18" y="65" width="8" height="2" rx="1" fill="#f59e0b" opacity="0.3"/>
  </g>
  
  <!-- Transformation arrow - curved and elegant -->
  <path d="M 52 64 Q 64 48 76 64" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 72 60 L 76 64 L 72 68" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- "After" organized files -->
  <g opacity="0.95">
    <!-- Organized file stack -->
    <rect x="80" y="25" width="28" height="50" rx="4" fill="url(#fileWhite)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    
    <!-- Clean, organized text lines -->
    <rect x="84" y="32" width="20" height="2.5" rx="1.25" fill="#22c55e" opacity="0.8"/>
    <rect x="84" y="36" width="16" height="2.5" rx="1.25" fill="#22c55e" opacity="0.7"/>
    <rect x="84" y="40" width="18" height="2.5" rx="1.25" fill="#22c55e" opacity="0.8"/>
    <rect x="84" y="44" width="14" height="2.5" rx="1.25" fill="#22c55e" opacity="0.6"/>
    <rect x="84" y="48" width="20" height="2.5" rx="1.25" fill="#22c55e" opacity="0.7"/>
    <rect x="84" y="52" width="16" height="2.5" rx="1.25" fill="#22c55e" opacity="0.8"/>
    <rect x="84" y="56" width="18" height="2.5" rx="1.25" fill="#22c55e" opacity="0.6"/>
    <rect x="84" y="60" width="12" height="2.5" rx="1.25" fill="#22c55e" opacity="0.7"/>
    <rect x="84" y="64" width="16" height="2.5" rx="1.25" fill="#22c55e" opacity="0.8"/>
    <rect x="84" y="68" width="20" height="2.5" rx="1.25" fill="#22c55e" opacity="0.6"/>
  </g>
  
  <!-- Professional badge/seal element -->
  <circle cx="64" cy="90" r="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="64" y="96" font-family="Inter, sans-serif" font-size="12" font-weight="800" text-anchor="middle" fill="white">BR</text>
  
  <!-- Subtle rim highlight -->
  <circle cx="64" cy="64" r="59" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
</svg>