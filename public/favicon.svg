<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    
    <linearGradient id="fileGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e5e7eb"/>
    </linearGradient>

    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937"/>
      <stop offset="100%" style="stop-color:#374151"/>
    </linearGradient>
  </defs>
  
  <!-- Rounded background -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="url(#bgGradient)"/>
  
  <!-- Files transformation concept -->
  <!-- Before: Messy file with random name -->
  <rect x="4" y="6" width="10" height="12" rx="1.5" fill="url(#fileGradient)" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <rect x="5.5" y="8" width="5" height="0.8" rx="0.4" fill="#ef4444" opacity="0.7"/>
  <rect x="5.5" y="10" width="7" height="0.8" rx="0.4" fill="#ef4444" opacity="0.5"/>
  <rect x="5.5" y="12" width="4" height="0.8" rx="0.4" fill="#ef4444" opacity="0.6"/>
  
  <!-- Transformation arrow -->
  <path d="M15 10 L17 12 L15 14 M15.5 12 L18 12" stroke="#ffffff" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  
  <!-- After: Organized file with clean name -->
  <rect x="18.5" y="6" width="10" height="12" rx="1.5" fill="url(#fileGradient)" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <rect x="20" y="8" width="6" height="0.8" rx="0.4" fill="#22c55e" opacity="0.8"/>
  <rect x="20" y="10" width="5" height="0.8" rx="0.4" fill="#22c55e" opacity="0.7"/>
  <rect x="20" y="12" width="7" height="0.8" rx="0.4" fill="#22c55e" opacity="0.6"/>
  
  <!-- BR monogram at bottom -->
  <text x="16" y="26" font-family="Inter, sans-serif" font-size="6" font-weight="700" text-anchor="middle" fill="rgba(255,255,255,0.9)">BR</text>
  
  <!-- Subtle glow effect -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
</svg>