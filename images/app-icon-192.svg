<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="30%" style="stop-color:#2563eb"/>
      <stop offset="70%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="192" height="192" rx="42" fill="url(#mainBg)" filter="url(#glow)"/>
  
  <!-- BEFORE files - chaotic mess -->
  <g opacity="0.9">
    <!-- First messy file -->
    <rect x="32" y="40" width="44" height="56" rx="6" fill="white" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <rect x="38" y="50" width="24" height="3" rx="1.5" fill="#ef4444" opacity="0.6"/>
    <rect x="38" y="56" width="32" height="3" rx="1.5" fill="#ef4444" opacity="0.4"/>
    <rect x="38" y="62" width="18" height="3" rx="1.5" fill="#ef4444" opacity="0.5"/>
    <rect x="38" y="68" width="28" height="3" rx="1.5" fill="#ef4444" opacity="0.3"/>
    <rect x="38" y="74" width="14" height="3" rx="1.5" fill="#ef4444" opacity="0.6"/>
    <rect x="38" y="80" width="22" height="3" rx="1.5" fill="#ef4444" opacity="0.4"/>
    <rect x="38" y="86" width="16" height="3" rx="1.5" fill="#ef4444" opacity="0.5"/>
    
    <!-- Second overlapping messy file -->
    <rect x="24" y="70" width="38" height="48" rx="5" fill="white" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <rect x="28" y="78" width="22" height="2.5" rx="1.25" fill="#f59e0b" opacity="0.6"/>
    <rect x="28" y="83" width="28" height="2.5" rx="1.25" fill="#f59e0b" opacity="0.4"/>
    <rect x="28" y="88" width="16" height="2.5" rx="1.25" fill="#f59e0b" opacity="0.5"/>
    <rect x="28" y="93" width="24" height="2.5" rx="1.25" fill="#f59e0b" opacity="0.4"/>
    <rect x="28" y="98" width="18" height="2.5" rx="1.25" fill="#f59e0b" opacity="0.6"/>
    <rect x="28" y="103" width="12" height="2.5" rx="1.25" fill="#f59e0b" opacity="0.3"/>
  </g>
  
  <!-- Elegant transformation arrow -->
  <path d="M 86 96 Q 96 76 106 96" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 101 91 L 106 96 L 101 101" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- AFTER - beautifully organized file -->
  <g opacity="0.95">
    <rect x="116" y="40" width="44" height="80" rx="6" fill="white" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    
    <!-- Clean, organized content lines -->
    <rect x="122" y="50" width="32" height="3" rx="1.5" fill="#22c55e" opacity="0.8"/>
    <rect x="122" y="56" width="26" height="3" rx="1.5" fill="#22c55e" opacity="0.7"/>
    <rect x="122" y="62" width="30" height="3" rx="1.5" fill="#22c55e" opacity="0.8"/>
    <rect x="122" y="68" width="22" height="3" rx="1.5" fill="#22c55e" opacity="0.6"/>
    <rect x="122" y="74" width="32" height="3" rx="1.5" fill="#22c55e" opacity="0.7"/>
    <rect x="122" y="80" width="26" height="3" rx="1.5" fill="#22c55e" opacity="0.8"/>
    <rect x="122" y="86" width="28" height="3" rx="1.5" fill="#22c55e" opacity="0.6"/>
    <rect x="122" y="92" width="20" height="3" rx="1.5" fill="#22c55e" opacity="0.7"/>
    <rect x="122" y="98" width="26" height="3" rx="1.5" fill="#22c55e" opacity="0.8"/>
    <rect x="122" y="104" width="32" height="3" rx="1.5" fill="#22c55e" opacity="0.6"/>
    <rect x="122" y="110" width="24" height="3" rx="1.5" fill="#22c55e" opacity="0.7"/>
  </g>
  
  <!-- Professional brand badge -->
  <circle cx="96" cy="140" r="18" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="96" y="148" font-family="Inter, sans-serif" font-size="16" font-weight="800" text-anchor="middle" fill="white">BR</text>
  
  <!-- Subtle outer rim -->
  <rect width="192" height="192" rx="42" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
</svg>